<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — QR Studio</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23818CF8'/%3E%3Crect x='6' y='6' width='8' height='8' rx='1.5' fill='white'/%3E%3Crect x='18' y='6' width='8' height='8' rx='1.5' fill='white'/%3E%3Crect x='6' y='18' width='8' height='8' rx='1.5' fill='white'/%3E%3Crect x='20' y='20' width='4' height='4' rx='1' fill='white'/%3E%3C/svg%3E">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card fade-in-up">
      <div class="card-header">
        <a href="/" class="navbar-brand" style="justify-content: center; margin-bottom: 1rem;">
          <span class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3" rx="0.5"/></svg></span>
          <span>QR Studio</span>
        </a>
        <h1 class="card-title">Welcome back</h1>
        <p class="card-subtitle">Sign in to manage your QR codes</p>
      </div>
      
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <input type="email" class="form-control" id="login-email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <input type="password" class="form-control" id="login-password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-full" id="login-btn">
          Sign In
        </button>
      </form>

      <div class="auth-footer">
        Don't have an account? <a href="/register">Sign up</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner spinner-sm"></span> Signing in...';

      try {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;
        await API.login(email, password);
        showToast('Login successful!', 'success');
        setTimeout(() => window.location.href = '/dashboard', 500);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
