<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — QR Studio</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23818CF8'/%3E%3Crect x='6' y='6' width='8' height='8' rx='1.5' fill='white'/%3E%3Crect x='18' y='6' width='8' height='8' rx='1.5' fill='white'/%3E%3Crect x='6' y='18' width='8' height='8' rx='1.5' fill='white'/%3E%3Crect x='20' y='20' width='4' height='4' rx='1' fill='white'/%3E%3C/svg%3E">
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="container">
      <a href="/" class="navbar-brand">
        <span class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="3" height="3" rx="0.5"/></svg>
        </span>
        <span>QR Studio</span>
      </a>
      <ul class="navbar-nav" id="auth-nav"></ul>
    </div>
  </nav>

  <div class="page">
    <div class="container">
      <!-- Stats -->
      <div class="stats-grid stagger" id="stats-grid">
        <div class="stat-card">
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-label">Total QR Codes</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-dynamic">—</div>
          <div class="stat-label">Dynamic QR Codes</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-scans">—</div>
          <div class="stat-label">Total Scans</div>
        </div>
      </div>

      <!-- Header -->
      <div class="dashboard-header">
        <h1>My QR Codes</h1>
        <a href="/#generator" class="btn btn-primary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-2px;"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Create New</a>
      </div>

      <!-- QR List -->
      <div id="qr-list" class="qr-list">
        <div class="empty-state" id="loading-state">
          <div class="spinner" style="margin: 0 auto;"></div>
          <p class="mt-md">Loading your QR codes...</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay hidden" id="edit-modal">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Edit QR Code</h2>
        <button class="btn btn-icon btn-ghost" onclick="closeEditModal()">✕</button>
      </div>
      <div id="edit-form-content"></div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="closeEditModal()">Cancel</button>
        <button class="btn btn-primary" id="edit-save-btn" onclick="saveEdit()">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- Analytics Modal -->
  <div class="modal-overlay hidden" id="analytics-modal">
    <div class="modal" style="max-width: 680px;">
      <div class="modal-header">
        <h2 class="modal-title" id="analytics-title">Analytics</h2>
        <button class="btn btn-icon btn-ghost" onclick="closeAnalyticsModal()">✕</button>
      </div>
      <div id="analytics-content">
        <div class="text-center"><div class="spinner" style="margin: 0 auto;"></div></div>
      </div>
    </div>
  </div>

  <!-- QR Preview Modal -->
  <div class="modal-overlay hidden" id="preview-modal">
    <div class="modal" style="max-width: 520px;">
      <div class="modal-header">
        <h2 class="modal-title" id="preview-title">QR Code Preview</h2>
        <button class="btn btn-icon btn-ghost" onclick="closePreviewModal()">✕</button>
      </div>
      <div class="preview-body">
        <div id="preview-qr-container" class="preview-qr-container"></div>
        <div class="preview-download-actions">
          <button class="btn btn-secondary btn-sm" onclick="downloadPreviewQR('png')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-2px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> PNG</button>
          <button class="btn btn-secondary btn-sm" onclick="downloadPreviewQR('svg')"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:-2px;"><path d="M14 3v4a1 1 0 0 0 1 1h4"/><path d="M5 12V5a2 2 0 0 1 2-2h7l5 5v4"/><path d="M3 15l3 6 3-6"/></svg> SVG</button>
        </div>
        <div id="preview-meta" class="preview-meta"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/qr-code-styling@1.8.4/lib/qr-code-styling.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
