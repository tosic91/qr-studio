<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — QR Studio</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📲</text></svg>">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card fade-in-up">
      <div class="card-header">
        <a href="/" class="navbar-brand" style="justify-content: center; margin-bottom: 1rem;">
          <span class="logo-icon">⚡</span>
          <span>QR Studio</span>
        </a>
        <h1 class="card-title">Create your account</h1>
        <p class="card-subtitle">Start creating dynamic QR codes for free</p>
      </div>
      
      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label" for="reg-name">Name</label>
          <input type="text" class="form-control" id="reg-name" placeholder="Your name" autocomplete="name">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email</label>
          <input type="email" class="form-control" id="reg-email" placeholder="you@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <input type="password" class="form-control" id="reg-password" placeholder="Min 6 characters" required minlength="6" autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-lg w-full" id="register-btn">
          Create Account
        </button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login">Sign in</a>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner spinner-sm"></span> Creating account...';

      try {
        const name = document.getElementById('reg-name').value;
        const email = document.getElementById('reg-email').value;
        const password = document.getElementById('reg-password').value;
        await API.register(email, password, name);
        showToast('Account created!', 'success');
        setTimeout(() => window.location.href = '/dashboard', 500);
      } catch (err) {
        showToast(err.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Create Account';
      }
    }
  </script>
</body>
</html>
